<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOF Atlas — Metal-Organic Framework Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://3dmol.org/build/3Dmol-min.js"></script>

<style>
:root {
  --bg-deep:     #080F1C;
  --bg-base:     #0B1425;
  --bg-panel:    #0F1A30;
  --bg-card:     #131E35;
  --bg-card-hover: #172240;
  --bg-input:    #0D1628;
  --border:      #1E2D4A;
  --border-bright: #2A3D60;
  --cyan:        #00D4C8;
  --cyan-dim:    #00A89E;
  --cyan-glow:   rgba(0,212,200,0.15);
  --amber:       #F0A030;
  --amber-dim:   #C07818;
  --text-primary: #E8F0FF;
  --text-secondary: #7A90B0;
  --text-muted:  #4A5E7A;
  --text-mono:   #A0C4D0;
  --success:     #2ECC71;
  --warning:     #F39C12;
  --metal-color: #8B9DC3;
  --ligand-color: #C3A87A;
  --topology-color: #A87AC3;
  --font-main: 'Space Grotesk', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 6px;
  --radius-lg: 10px;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-main);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }

/* ── HEADER ──────────────────────────────────────────── */
#header {
  position: relative;
  height: 200px;
  background: linear-gradient(135deg, #060D1A 0%, #0B1425 50%, #0A1830 100%);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  padding: 0 40px;
}

#topology-canvas {
  position: absolute;
  inset: 0;
  opacity: 0.18;
  pointer-events: none;
}

.header-content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 32px;
  width: 100%;
}

.header-logo {
  flex-shrink: 0;
}

.logo-mark {
  width: 56px;
  height: 56px;
}

.header-titles {
  flex: 1;
}

.header-title {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text-primary);
}

.header-title span {
  color: var(--cyan);
}

.header-subtitle {
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 400;
  margin-top: 6px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-stats {
  display: flex;
  gap: 28px;
  flex-shrink: 0;
}

.stat-item {
  text-align: right;
}

.stat-value {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--cyan);
  font-family: var(--font-mono);
  line-height: 1;
}

.stat-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

/* ── MAIN LAYOUT ─────────────────────────────────────── */
#app {
  display: flex;
  height: calc(100vh - 200px);
  overflow: hidden;
}

/* ── FILTER RAIL ─────────────────────────────────────── */
#filter-rail {
  width: 300px;
  flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.rail-section {
  margin-bottom: 4px;
}

.rail-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: background var(--transition);
  user-select: none;
}

.rail-section-header:hover { background: var(--bg-card); }

.rail-section-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}

.rail-section-title.active { color: var(--cyan); }

.rail-chevron {
  width: 14px;
  height: 14px;
  color: var(--text-muted);
  transition: transform var(--transition);
}

.rail-chevron.open { transform: rotate(180deg); }

.rail-section-body {
  padding: 6px 4px 8px;
}

.rail-section-body.collapsed { display: none; }

/* Search inputs */
.filter-input-wrap {
  position: relative;
  margin-bottom: 8px;
}

.filter-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px 8px 32px;
  font-family: var(--font-main);
  font-size: 0.82rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.filter-input:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 2px var(--cyan-glow);
}

.filter-input::placeholder { color: var(--text-muted); }

.filter-input-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text-muted);
  pointer-events: none;
}

/* Tag-style multi-selects */
.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  max-height: 120px;
  overflow-y: auto;
}

.tag-pill {
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  background: transparent;
  transition: all var(--transition);
  font-family: var(--font-main);
  white-space: nowrap;
}

.tag-pill:hover { border-color: var(--border-bright); color: var(--text-primary); }

.tag-pill.active-metal {
  border-color: var(--metal-color);
  color: var(--metal-color);
  background: rgba(139,157,195,0.1);
}

.tag-pill.active-ligand {
  border-color: var(--ligand-color);
  color: var(--ligand-color);
  background: rgba(195,168,122,0.1);
}

.tag-pill.active-topology {
  border-color: var(--topology-color);
  color: var(--topology-color);
  background: rgba(168,122,195,0.1);
}

.tag-pill.active-app {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-glow);
}

/* Range sliders */
.range-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.range-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  width: 80px;
  flex-shrink: 0;
}

.range-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  border-radius: 2px;
  background: var(--border-bright);
  outline: none;
}

.range-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
}

.range-value {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--cyan);
  width: 40px;
  text-align: right;
}

/* Sort + clear */
.rail-actions {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.btn-rail {
  width: 100%;
  padding: 8px;
  border-radius: var(--radius);
  font-family: var(--font-main);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.btn-rail:hover {
  border-color: var(--cyan-dim);
  color: var(--cyan);
  background: var(--cyan-glow);
}

.btn-rail.primary {
  border-color: var(--cyan-dim);
  background: var(--cyan-glow);
  color: var(--cyan);
}

.btn-rail.danger:hover {
  border-color: #E74C3C;
  color: #E74C3C;
  background: rgba(231,76,60,0.1);
}

select.filter-select {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-family: var(--font-main);
  font-size: 0.82rem;
  color: var(--text-secondary);
  outline: none;
  cursor: pointer;
  margin-bottom: 8px;
}

select.filter-select:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 2px var(--cyan-glow);
}

/* ── RESULTS AREA ────────────────────────────────────── */
#results-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#results-toolbar {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--bg-base);
  flex-shrink: 0;
}

.results-count {
  font-size: 0.82rem;
  color: var(--text-muted);
}

.results-count strong {
  color: var(--text-primary);
  font-weight: 600;
}

.results-count span.cyan { color: var(--cyan); }

#main-search-wrap {
  flex: 1;
  position: relative;
  max-width: 480px;
}

#main-search {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 9px 16px 9px 38px;
  font-family: var(--font-main);
  font-size: 0.88rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

#main-search:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 3px var(--cyan-glow);
}

#main-search::placeholder { color: var(--text-muted); }

.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--text-muted);
  pointer-events: none;
}

.view-toggle {
  display: flex;
  gap: 2px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px;
}

.view-btn {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all var(--transition);
  border: none;
  background: transparent;
}

.view-btn:hover { color: var(--text-primary); background: var(--bg-card); }
.view-btn.active { background: var(--bg-card-hover); color: var(--cyan); }

/* Active filter chips */
#active-chips {
  padding: 0 24px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 0;
}

.active-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px 3px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 20px;
  font-size: 0.72rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}

.active-chip:hover { border-color: #E74C3C; color: #E74C3C; }

.active-chip .chip-x { color: var(--text-muted); font-size: 0.9em; }

/* ── CARD GRID ───────────────────────────────────────── */
#card-grid {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
  align-content: start;
}

#card-grid.list-view {
  grid-template-columns: 1fr;
}

.mof-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.mof-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}

.mof-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-bright);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,200,0.08);
}

.mof-card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.card-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}

.card-iupac {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 2px;
  font-family: var(--font-mono);
}

.card-year {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  flex-shrink: 0;
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
}

.card-formula {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-mono);
  margin-bottom: 10px;
  padding: 5px 8px;
  background: rgba(0,0,0,0.25);
  border-radius: 4px;
  border-left: 2px solid var(--cyan-dim);
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.card-tag {
  font-size: 0.68rem;
  padding: 2px 7px;
  border-radius: 3px;
  font-weight: 500;
}

.tag-metal { background: rgba(139,157,195,0.12); color: var(--metal-color); border: 1px solid rgba(139,157,195,0.25); }
.tag-ligand { background: rgba(195,168,122,0.12); color: var(--ligand-color); border: 1px solid rgba(195,168,122,0.25); }
.tag-topology { background: rgba(168,122,195,0.12); color: var(--topology-color); border: 1px solid rgba(168,122,195,0.25); }
.tag-app { background: rgba(0,212,200,0.08); color: var(--cyan); border: 1px solid rgba(0,212,200,0.2); }
.tag-sbu { background: rgba(240,160,48,0.1); color: var(--amber); border: 1px solid rgba(240,160,48,0.2); }

.card-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}

.metric-box {
  background: rgba(0,0,0,0.2);
  border-radius: 5px;
  padding: 6px 8px;
  text-align: center;
}

.metric-value {
  font-size: 0.82rem;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-primary);
  line-height: 1;
}

.metric-label {
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.card-group {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.card-group strong {
  color: var(--text-secondary);
  font-weight: 500;
}

.card-actions {
  display: flex;
  gap: 6px;
}

.card-btn {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.72rem;
  font-family: var(--font-main);
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  transition: all var(--transition);
}

.card-btn:hover {
  border-color: var(--cyan-dim);
  color: var(--cyan);
  background: var(--cyan-glow);
}

.card-btn.primary {
  border-color: var(--cyan-dim);
  color: var(--cyan);
  background: var(--cyan-glow);
}

.no-results {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}

.no-results svg {
  width: 48px;
  height: 48px;
  margin: 0 auto 16px;
  display: block;
  opacity: 0.3;
}

.no-results h3 {
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.no-results p { font-size: 0.85rem; }

/* ── DETAIL PANEL ────────────────────────────────────── */
#detail-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(4, 8, 18, 0.8);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: stretch;
  justify-content: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

#detail-overlay.open {
  opacity: 1;
  pointer-events: all;
}

#detail-panel {
  width: 860px;
  max-width: 95vw;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  transform: translateX(40px);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

#detail-overlay.open #detail-panel {
  transform: translateX(0);
}

.detail-close {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
}

.detail-close-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.detail-close-btn:hover { border-color: var(--cyan-dim); color: var(--cyan); }

.detail-breadcrumb {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.detail-breadcrumb span { color: var(--text-secondary); }

/* Detail sections */
.detail-hero {
  padding: 28px 28px 0;
}

.detail-name {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--text-primary);
  line-height: 1.1;
}

.detail-name .cyan { color: var(--cyan); }

.detail-aliases {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}

.detail-formula-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 14px 0;
  flex-wrap: wrap;
}

.detail-formula {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--text-mono);
  background: rgba(0,0,0,0.3);
  padding: 6px 12px;
  border-radius: 5px;
  border-left: 3px solid var(--cyan);
}

.detail-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}

/* Viewer + info two-column */
.detail-body {
  padding: 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.detail-viewer-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.viewer-container {
  position: relative;
  background: #050B18;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  height: 320px;
}

#viewer-3d {
  width: 100%;
  height: 100%;
}

.viewer-controls {
  position: absolute;
  bottom: 10px;
  right: 10px;
  display: flex;
  gap: 5px;
  z-index: 5;
}

.viewer-btn {
  padding: 4px 8px;
  background: rgba(11,20,37,0.85);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  font-size: 0.68rem;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-main);
  transition: all var(--transition);
}

.viewer-btn:hover { border-color: var(--cyan-dim); color: var(--cyan); }

.viewer-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Quick facts grid */
.facts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.fact-item {
  background: rgba(0,0,0,0.2);
  border-radius: var(--radius);
  padding: 10px 12px;
  border: 1px solid var(--border);
}

.fact-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.fact-value {
  font-size: 0.88rem;
  color: var(--text-primary);
  font-weight: 500;
}

.fact-value.mono { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-mono); }
.fact-value.cyan { color: var(--cyan); }
.fact-value.amber { color: var(--amber); }
.fact-value.topology { color: var(--topology-color); }

/* Section headings */
.detail-section {
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.detail-section-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.detail-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Properties table */
.props-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.props-table th {
  text-align: left;
  padding: 7px 10px;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}

.props-table td {
  padding: 8px 10px;
  border-bottom: 1px solid rgba(30,45,74,0.5);
  color: var(--text-secondary);
  vertical-align: top;
}

.props-table tr:last-child td { border-bottom: none; }

.props-table td.mono {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-mono);
}

.props-table td.val {
  color: var(--text-primary);
  font-weight: 500;
}

/* Application pills */
.apps-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.app-pill {
  padding: 5px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.78rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.app-pill.demonstrated {
  border-color: rgba(0,212,200,0.3);
  color: var(--cyan);
  background: var(--cyan-glow);
}

.app-pill.proposed {
  border-color: rgba(240,160,48,0.3);
  color: var(--amber);
  background: rgba(240,160,48,0.05);
}

.app-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.app-dot.demo { background: var(--cyan); }
.app-dot.prop { background: var(--amber); }

/* References */
.ref-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ref-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  transition: border-color var(--transition);
}

.ref-item:hover { border-color: var(--border-bright); }

.ref-title {
  font-size: 0.85rem;
  color: var(--text-primary);
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 4px;
}

.ref-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.ref-journal { color: var(--text-secondary); }

.ref-primary-badge {
  font-size: 0.65rem;
  padding: 1px 6px;
  background: var(--cyan-glow);
  border: 1px solid rgba(0,212,200,0.3);
  color: var(--cyan);
  border-radius: 3px;
  font-weight: 600;
}

.ref-doi {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.72rem;
  color: var(--cyan-dim);
  text-decoration: none;
  transition: color var(--transition);
}

.ref-doi:hover { color: var(--cyan); }

/* Ligand schematic */
.ligand-section {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.ligand-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  min-width: 160px;
  flex: 1;
}

.ligand-name {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ligand-color);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.ligand-smiles {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  word-break: break-all;
  margin-bottom: 8px;
}

.ligand-img-wrap {
  background: #fff;
  border-radius: 4px;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100px;
}

.ligand-img-wrap img { max-width: 100%; max-height: 100px; }

/* Gas sorption data */
.sorption-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.sorption-table th {
  text-align: left;
  padding: 6px 10px;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.sorption-table td {
  padding: 8px 10px;
  border-bottom: 1px solid rgba(30,45,74,0.5);
  color: var(--text-secondary);
}

.sorption-table tr:last-child td { border-bottom: none; }

.sorption-bar-cell { min-width: 120px; }

.sorption-bar-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
}

.sorption-bar {
  flex: 1;
  height: 5px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.sorption-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
}

.sorption-val {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-primary);
  min-width: 60px;
  text-align: right;
}

/* ── SKELETON / LOADING ──────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: 4px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.mof-card { animation: fadeInUp 0.25s ease both; }

/* ── TOOLTIP ─────────────────────────────────────────── */
.tooltip {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-size: 0.72rem;
  color: var(--text-primary);
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.12s;
}

/* ── SEPARATOR DIVIDER ───────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 900px) {
  #filter-rail { width: 260px; }
  .header-stats { display: none; }
  .detail-viewer-row { grid-template-columns: 1fr; }
}

@media (max-width: 700px) {
  #filter-rail { display: none; }
  #header { height: 120px; padding: 0 20px; }
  .header-title { font-size: 1.4rem; }
}
</style>
</head>

function setupListeners() {
  document.getElementById('main-search').addEventListener('input', e => {
    filters.text = e.target.value.toLowerCase();
    renderCards();
  });
  document.getElementById('rail-search').addEventListener('input', e => {
    filters.text = e.target.value.toLowerCase();
    document.getElementById('main-search').value = e.target.value;
    renderCards();
  });
  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    renderCards();
  });
  document.getElementById('interp-select').addEventListener('change', e => {
    filters.interpenetration = e.target.value;
    renderCards();
  });
  document.getElementById('year-from').addEventListener('input', e => {
    filters.yearFrom = +e.target.value;
    document.getElementById('year-from-val').textContent = e.target.value;
    renderCards();
  });
  document.getElementById('year-to').addEventListener('input', e => {
    filters.yearTo = +e.target.value;
    document.getElementById('year-to-val').textContent = e.target.value;
    renderCards();
  });
}

// ═══════════════════════════════════════════════════════════════
//  FILTER CLOUD BUILDING
// ═══════════════════════════════════════════════════════════════
function buildFilterClouds() {
  const metals = new Set(), ligands = new Set(), topologies = new Set(), apps = new Set(), sbus = new Set();
  MOF_DATA.forEach(m => {
    m.metals.forEach(x => metals.add(x));
    m.ligands.forEach(x => ligands.add(x.name));
    if (m.topology) topologies.add(m.topology);
    m.applications.forEach(a => apps.add(a.name.replace(/[₀-₉]/g, s => String.fromCharCode(s.charCodeAt(0) - 8272 + 48))));
    if (m.sbu_type) sbus.add(m.sbu_type.split('/')[0].trim().split('(')[0].trim());
  });

  populateCloud('metal-cloud', [...metals].sort(), 'metal');
  populateCloud('ligand-cloud', [...ligands].sort(), 'ligand');
  populateCloud('topology-cloud', [...topologies].sort(), 'topology');
  populateCloud('app-cloud', [...apps].sort(), 'app');
  populateCloud('sbu-cloud', [...new Set([...sbus])].sort(), 'sbu');
}

function populateCloud(containerId, items, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item => {
    const pill = document.createElement('button');
    pill.className = 'tag-pill';
    pill.textContent = item;
    pill.dataset.value = item;
    pill.dataset.type = type;
    pill.addEventListener('click', () => toggleFilter(type, item, pill));
    el.appendChild(pill);
  });
}

function toggleFilter(type, value, el) {
  const setMap = {
    metal: filters.metals, ligand: filters.ligands,
    topology: filters.topologies, app: filters.apps, sbu: filters.sbus
  };
  const classMap = {
    metal: 'active-metal', ligand: 'active-ligand',
    topology: 'active-topology', app: 'active-app', sbu: 'active-app'
  };
  const s = setMap[type];
  if (s.has(value)) {
    s.delete(value);
    el.className = 'tag-pill';
  } else {
    s.add(value);
    el.className = `tag-pill ${classMap[type]}`;
  }
  renderCards();
  updateChips();
}

function updateChips() {
  const container = document.getElementById('active-chips');
  container.innerHTML = '';
  const addChip = (label, onRemove) => {
    const chip = document.createElement('div');
    chip.className = 'active-chip';
    chip.innerHTML = `${label} <span class="chip-x">✕</span>`;
    chip.addEventListener('click', onRemove);
    container.appendChild(chip);
  };
  filters.metals.forEach(v => addChip(`Metal: ${v}`, () => removeFilter('metal', v)));
  filters.ligands.forEach(v => addChip(`Ligand: ${v}`, () => removeFilter('ligand', v)));
  filters.topologies.forEach(v => addChip(`Topology: ${v}`, () => removeFilter('topology', v)));
  filters.apps.forEach(v => addChip(`App: ${v.substring(0,20)}…`, () => removeFilter('app', v)));
  filters.sbus.forEach(v => addChip(`SBU: ${v}`, () => removeFilter('sbu', v)));
  if (filters.interpenetration) addChip(`Interp.: ${filters.interpenetration}`, () => { filters.interpenetration=''; document.getElementById('interp-select').value=''; renderCards(); updateChips(); });
}

function removeFilter(type, value) {
  const setMap = { metal: filters.metals, ligand: filters.ligands, topology: filters.topologies, app: filters.apps, sbu: filters.sbus };
  setMap[type].delete(value);
  // update pill UI
  document.querySelectorAll(`.tag-pill[data-type="${type}"][data-value="${value}"]`).forEach(p => p.className = 'tag-pill');
  renderCards();
  updateChips();
}

function clearFilters() {
  filters = { text:'', metals:new Set(), ligands:new Set(), topologies:new Set(), apps:new Set(), sbus:new Set(), interpenetration:'', yearFrom:1989, yearTo:2024 };
  document.getElementById('main-search').value = '';
  document.getElementById('rail-search').value = '';
  document.getElementById('interp-select').value = '';
  document.getElementById('year-from').value = '1989';
  document.getElementById('year-to').value = '2024';
  document.getElementById('year-from-val').textContent = '1989';
  document.getElementById('year-to-val').textContent = '2024';
  document.querySelectorAll('.tag-pill').forEach(p => p.className = 'tag-pill');
  renderCards();
  updateChips();
}

function toggleSection(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  body.classList.toggle('collapsed');
  chev.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
//  FILTERING + SORTING
// ═══════════════════════════════════════════════════════════════
function getFiltered() {
  return MOF_DATA.filter(m => {
    if (filters.text) {
      const t = filters.text;
      const searchable = [m.name, m.formula, m.formula_clean, ...m.aliases,
        m.topology, m.sbu, m.group, m.category, ...m.metals,
        ...m.ligands.map(l => l.name + ' ' + l.fullname),
        ...m.applications.map(a => a.name)
      ].join(' ').toLowerCase();
      if (!searchable.includes(t)) return false;
    }
    if (filters.metals.size > 0) {
      if (!m.metals.some(mt => filters.metals.has(mt))) return false;
    }
    if (filters.ligands.size > 0) {
      if (!m.ligands.some(l => filters.ligands.has(l.name))) return false;
    }
    if (filters.topologies.size > 0) {
      if (!filters.topologies.has(m.topology)) return false;
    }
    if (filters.apps.size > 0) {
      const mApps = m.applications.map(a => a.name.replace(/[₀-₉]/g, s => String.fromCharCode(s.charCodeAt(0)-8272+48)));
      if (!mApps.some(a => filters.apps.has(a))) return false;
    }
    if (filters.interpenetration) {
      const ip = filters.interpenetration;
      if (ip === '4+' && m.interpenetration < 4) return false;
      if (ip !== '4+' && m.interpenetration !== +ip) return false;
    }
    if (m.year < filters.yearFrom || m.year > filters.yearTo) return false;
    return true;
  });
}

function getSorted(arr) {
  return [...arr].sort((a,b) => {
    switch(sortMode) {
      case 'name': return a.name.localeCompare(b.name);
      case 'year-asc': return a.year - b.year;
      case 'year-desc': return b.year - a.year;
      case 'bet-desc': return (b.bet_m2_g||0) - (a.bet_m2_g||0);
      case 'pore-desc': return (b.pore_size_A||0) - (a.pore_size_A||0);
      default: return 0;
    }
  });
}

// ═══════════════════════════════════════════════════════════════
//  RENDER CARDS
// ═══════════════════════════════════════════════════════════════
function renderCards() {
  const grid = document.getElementById('card-grid');
  const filtered = getSorted(getFiltered());
  const total = MOF_DATA.length;

  document.getElementById('results-count').innerHTML =
    `Showing <strong>${filtered.length}</strong> <span class="cyan">of ${total}</span> frameworks`;

  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <h3>No frameworks found</h3>
      <p>Try adjusting your search criteria or clearing filters.</p>
    </div>`;
    return;
  }

  filtered.forEach((mof, i) => {
    const card = document.createElement('div');
    card.className = 'mof-card';
    card.style.animationDelay = `${Math.min(i * 0.03, 0.4)}s`;
    card.innerHTML = buildCardHTML(mof);
    card.addEventListener('click', () => openDetail(mof));
    grid.appendChild(card);
  });
}

      <div class="metric-box">
        <div class="metric-value">${bet}</div>
        <div class="metric-label">BET m²/g</div>
      </div>
      <div class="metric-box">
        <div class="metric-value">${pore} Å</div>

      <div class="metric-box">
        <div class="metric-value">${mof.interpenetration === 0 ? 'None' : mof.interpenetration + '×'}</div>

// ═══════════════════════════════════════════════════════════════
//  3D VIEWER
// ═══════════════════════════════════════════════════════════════
let spinOn = false;

function init3DViewer(mof) {
  const container = document.getElementById('viewer-3d');
  const loading = document.getElementById('viewer-loading');
  container.innerHTML = '';

  // Try to load CIF: 1) local /cif/ folder, 2) COD by cod_id, 3) RCSB PDB, 4) built-in XYZ
  const tryLoad = (url, format) => {
    return fetch(url)
      .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
      .then(data => {
        loading.style.display = 'none';
        render3D(container, data, format);
        return true;
      });
  };

  const localPath = `cif/${mof.id.replace(/[^a-zA-Z0-9-_]/g,'_')}.cif`;
  const codUrl = mof.cod_id ? `https://www.crystallography.net/cod/${mof.cod_id}.cif` : null;

  const chain = mof.cod_id
    ? tryLoad(localPath, 'cif').catch(() => tryLoad(codUrl, 'cif'))
    : tryLoad(localPath, 'cif');

  chain.catch(() => {
    // Fallback: generate a symbolic representation
    loading.style.display = 'none';
    renderSymbolic3D(container, mof);
  });
}

function render3D(container, cifData, format) {
  try {
    const config = { backgroundColor: '0x050B18', antialias: true };
    viewer3d = $3Dmol.createViewer(container, config);
    viewer3d.addModel(cifData, format, {normalizeSticks: true});
    viewer3d.setStyle({}, {stick: {radius: 0.12, colorscheme: 'Jmol'}, sphere: {scale: 0.25, colorscheme: 'Jmol'}});
    viewer3d.addUnitCell();
    viewer3d.zoomTo();
    viewer3d.render();
    viewer3d.spin(false);
  } catch(e) {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:0.8rem;">3Dmol render error</div>';
  }
}

function renderSymbolic3D(container, mof) {
  // Build a simple representative structure using 3Dmol with XYZ coordinates
  // We generate a representative asymmetric unit for known MOFs
  const xyzMap = {
    'MOF-5': buildMOF5XYZ(),
    'ZIF-8': buildZIF8XYZ(),
    'HKUST-1': buildHKUST1XYZ(),
  };

  const xyz = xyzMap[mof.id];
  if (xyz) {
    try {
      const config = { backgroundColor: '0x050B18', antialias: true };
      viewer3d = $3Dmol.createViewer(container, config);
      viewer3d.addModel(xyz, 'xyz');
      viewer3d.setStyle({}, {stick: {radius: 0.15, colorscheme: 'Jmol'}, sphere: {scale: 0.3, colorscheme: 'Jmol'}});
      viewer3d.zoomTo();
      viewer3d.render();
      return;
    } catch(e) {}
  }

  // Ultimate fallback: informational placeholder
  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:20px;text-align:center;">
      <div style="color:var(--text-muted);font-size:0.8rem;line-height:1.6;">
        <div style="color:var(--cyan);font-family:var(--font-mono);font-size:1.1rem;margin-bottom:8px;">${mof.id}</div>
        Place a CIF file at<br>
        <code style="color:var(--text-secondary);background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:3px;">cif/${mof.id.replace(/[^a-zA-Z0-9-_]/g,'_')}.cif</code><br>
        to enable 3D rendering.
        ${mof.cod_id ? `<br><br>Or add COD ID: <span style="color:var(--cyan)">${mof.cod_id}</span>` : ''}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  TOPOLOGY CANVAS ANIMATION
// ═══════════════════════════════════════════════════════════════
function initTopologyCanvas() {
  const canvas = document.getElementById('topology-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const nodes = [];
  const edges = [];
  const N = 28;

  for (let i = 0; i < N; i++) {
    nodes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2.5 + 1.5,
      phase: Math.random() * Math.PI * 2
    });
  }

  function buildEdges() {
    edges.length = 0;
    for (let i = 0; i < N; i++) {
      for (let j = i+1; j < N; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 180) edges.push([i, j, dist]);
      }
    }
  }

  let t = 0;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    t += 0.008;
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    });
    buildEdges();
    edges.forEach(([i,j,d]) => {
      const alpha = (1 - d/180) * 0.6;
      ctx.strokeStyle = `rgba(0,212,200,${alpha})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(nodes[i].x, nodes[i].y);
      ctx.lineTo(nodes[j].x, nodes[j].y);
      ctx.stroke();
    });
    nodes.forEach(n => {
      const pulse = 0.7 + 0.3 * Math.sin(t + n.phase);
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * pulse, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,212,200,${0.6 * pulse})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize', () => {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  });
}
